<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://ssl.p.jwpcdn.com/player/v/8.31.0/jwplayer.js"></script>
<script>
jwplayer.key = "7MeMRClEneUmFoHRO3u3ypzAZXlVgNtBE2pKDw==";
</script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
}

#player {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div id="player"></div>

<script>

const params = new URLSearchParams(window.location.search)
const stream = params.get("url")

if (!stream) {
  document.body.innerHTML = "No stream URL provided"
  throw new Error("No stream URL")
}

jwplayer("player").setup({
  file: "/hls?url=" + encodeURIComponent(stream),
  type: "hls",

  width: "100%",
  height: "100%",

  autostart: true,
  mute: true,
  controls: true,

  primary: "html5",
  preload: "auto",
  stretching: "uniform",

  fullscreen: {
    enabled: true
  },

  pipIcon: "enabled",
  retry: true
})

</script>

</body>
</html>
